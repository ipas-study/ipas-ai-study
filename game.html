<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ iPAS 學習副本地圖</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei','PingFang TC',system-ui,sans-serif;background:#EEF2F7;color:#1a1a1a;min-height:100vh}
a{text-decoration:none;color:inherit}

/* ════ HUD 頂部面板 ════ */
.hud{background:linear-gradient(135deg,#1A1A2E 0%,#16213E 60%,#0F3460 100%);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.hud-inner{max-width:900px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:12px}
.hud-brand{font-size:15px;font-weight:900;letter-spacing:.5px;display:flex;align-items:center;gap:6px;margin-right:auto}
.hud-brand span{font-size:11px;opacity:.7;font-weight:400}
.hud-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;transition:.15s}
.hud-back:hover{background:rgba(255,255,255,.25)}

/* ── HUD 統計 ── */
.hud-stats{display:flex;gap:10px;flex-wrap:wrap;align-items:center;width:100%}
.stat-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:6px 12px;display:flex;flex-direction:column;align-items:center;min-width:64px}
.stat-chip .sl{font-size:9px;opacity:.7;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.stat-chip .sv{font-size:16px;font-weight:900;line-height:1}

/* ── EXP Bar ── */
.exp-wrap{flex:1;min-width:160px}
.exp-label{display:flex;justify-content:space-between;font-size:10px;opacity:.8;margin-bottom:4px}
.exp-bar-bg{background:rgba(255,255,255,.15);border-radius:999px;height:12px;overflow:hidden}
.exp-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#FFD700,#FFA500);transition:width .6s}

/* ── HP Bar ── */
.hp-wrap{min-width:100px}
.hp-label{display:flex;justify-content:space-between;font-size:10px;opacity:.8;margin-bottom:4px}
.hp-bar-bg{background:rgba(255,255,255,.15);border-radius:999px;height:12px;overflow:hidden}
.hp-bar-fill{height:100%;border-radius:999px;transition:width .5s}

/* ════ 主內容 ════ */
.main{max-width:900px;margin:0 auto;padding:20px 16px 40px}

/* ── 頁首說明 ── */
.intro-card{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:20px;border-left:5px solid #4D96FF;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.intro-card h2{font-size:16px;font-weight:900;margin-bottom:6px}
.intro-card p{font-size:12px;color:#555;line-height:1.6}
.intro-steps{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.step-tag{background:#F0F4FF;border:1px solid #C5D5FF;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;color:#4D96FF}
.step-tag b{color:#1A1A2E}

/* ── World Section ── */
.world{margin-bottom:32px}
.world-banner{border-radius:14px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 12px rgba(0,0,0,.12)}
.world-banner .wb-icon{font-size:28px;line-height:1}
.world-banner .wb-info{flex:1}
.world-banner .wb-name{font-size:17px;font-weight:900;color:#fff;margin-bottom:2px}
.world-banner .wb-sub{font-size:11px;color:rgba(255,255,255,.8)}
.world-banner .wb-prog{text-align:right;color:#fff}
.world-banner .wb-prog .wp-num{font-size:22px;font-weight:900;line-height:1}
.world-banner .wb-prog .wp-lbl{font-size:10px;opacity:.8}
.world-clear{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.6);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:900;color:#fff;margin-top:4px;display:inline-block}

/* ── World 顏色 ── */
.w1{background:linear-gradient(135deg,#4D96FF,#2E7CF6)}
.w2{background:linear-gradient(135deg,#6BCB77,#44B853)}
.w3{background:linear-gradient(135deg,#FF6B6B,#E84040)}
.w4{background:linear-gradient(135deg,#FF9F43,#E8861F)}
.w5{background:linear-gradient(135deg,#9B59B6,#7D3C98)}

/* ── 關卡格線 ── */
.quest-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── 關卡卡片 ── */
.qcard{background:#fff;border-radius:14px;border:2px solid #e0e0e0;overflow:hidden;transition:.18s;position:relative;display:flex;flex-direction:column;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.qcard:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.12)}
.qcard.done{background:#F0FFF4;border-color:#A8E6B8}
.qcard.perfect{background:#FFFEF0;border-color:#FFD700}
.qcard.perfect .qc-lvnum{color:#D4A000}

/* 左邊色條 */
.qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:14px 0 0 14px}
.w1 .qcard::before,.qcard.w1::before{background:#4D96FF}
.w2 .qcard::before,.qcard.w2::before{background:#6BCB77}
.w3 .qcard::before,.qcard.w3::before{background:#FF6B6B}
.w4 .qcard::before,.qcard.w4::before{background:#FF9F43}
.w5 .qcard::before,.qcard.w5::before{background:#9B59B6}

.qc-head{padding:12px 14px 8px 18px;display:flex;align-items:flex-start;gap:10px}
.qc-lvnum{font-size:28px;font-weight:900;color:#BCC5CE;line-height:1;min-width:36px;text-align:center}
.qc-lvnum.lit{color:#1A1A2E}
.qc-meta{flex:1}
.qc-sec{font-size:10px;font-weight:700;color:#888;margin-bottom:2px;letter-spacing:.3px}
.qc-title{font-size:13px;font-weight:900;line-height:1.3;color:#1A1A2E}
.qc-desc{font-size:11px;color:#777;margin-top:3px;line-height:1.4}
.qc-status{display:flex;align-items:center;gap:6px;padding:0 14px 0 18px;margin-bottom:8px}
.stars-row{font-size:15px;letter-spacing:1px}
.status-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.3px}
.sb-done{background:#D4EDDA;color:#228B22}
.sb-perfect{background:#FFF3CD;color:#D4A000}
.sb-new{background:#F0F0F0;color:#888}
.qc-exp{font-size:10px;color:#aaa;margin-left:auto}

.qc-btns{padding:8px 14px 12px 18px;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:auto}
.qbtn{border:none;border-radius:9px;padding:8px 6px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px}
.qbtn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.qbtn.go{background:#4D96FF;color:#fff}
.qbtn.punch{background:#FF6B6B;color:#fff}
.qbtn.synced{background:#eee;color:#aaa;cursor:default}
.qbtn.synced:hover{filter:none;transform:none}

/* ── 通關 Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg.hide{display:none}
.modal-box{background:#fff;border-radius:20px;padding:28px 24px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-box h3{font-size:20px;font-weight:900;margin-bottom:4px}
.modal-box .msub{font-size:12px;color:#888;margin-bottom:20px;line-height:1.5}
.star-choices{display:grid;gap:10px;margin-bottom:16px}
.sc-btn{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 16px;cursor:pointer;font-weight:700;font-size:13px;text-align:left;transition:.15s;font-family:inherit}
.sc-btn:hover{border-color:#4D96FF;background:#F0F4FF}
.sc-btn.s1:hover{border-color:#FF9F43;background:#FFF8F0}
.sc-btn.s2:hover{border-color:#6BCB77;background:#F0FFF4}
.sc-btn.s3{border-color:#FFD700;background:#FFFEF0}
.sc-btn.s3:hover{border-color:#FFA500;background:#FFF8E0}
.modal-cancel{width:100%;background:#f5f5f5;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#666}

/* ── 世界完成橫幅 ── */
.world-clear-banner{background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px;box-shadow:0 4px 12px rgba(255,165,0,.3)}

.wcb-text h4{font-size:15px;font-weight:900;margin-bottom:2px}
.wcb-text p{font-size:11px;color:rgba(0,0,0,.6)}

/* ── Responsive ── */
@media(max-width:560px){
  .quest-grid{grid-template-columns:1fr}
  .hud-stats{gap:6px}
  .stat-chip{min-width:52px}
  .stat-chip .sv{font-size:14px}
}
</style>
</head>

/* ═══════════════════════════════════════
   LocalStorage
   ═══════════════════════════════════════ */
function loadG(){
  try{ return JSON.parse(localStorage.getItem(GAME_KEY)||'{}'); }catch(e){ return {}; }
}
function saveG(g){ localStorage.setItem(GAME_KEY, JSON.stringify(g)); }

function initG(){
  let g = loadG();
  if(!g.progress) g.progress = {};
  if(!g.hp) g.hp = 100;
  if(!g.streak) g.streak = 0;
  if(!g.lastLogin) g.lastLogin = null;

  const today = new Date().toISOString().slice(0,10);
  if(g.lastLogin && g.lastLogin !== today){
    const daysMissed = Math.floor((new Date() - new Date(g.lastLogin)) / 86400000);
    if(daysMissed >= 2){
      g.hp = Math.max(10, g.hp - (daysMissed - 1) * 5);
    }
    // streak: 若昨天有登入，+1；否則重置
    if(daysMissed === 1){ g.streak = (g.streak||0) + 1; }
    else { g.streak = 1; }
  } else if(!g.lastLogin){
    g.streak = 1;
  }
  g.lastLogin = today;
  saveG(g);
  return g;
}

function calcExp(g){
  return WORLDS.flatMap(w=>w.levels).reduce((sum, lvl)=>{
    const stars = (g.progress[lvlKey(lvl)]||{}).stars || 0;
    return sum + (stars>0 ? EXP_PER_STAR[stars] : 0);
  }, 0);
}

function lvlKey(lvl){ return 'g-'+lvl.num; }

/* ═══════════════════════════════════════
   渲染
   ═══════════════════════════════════════ */
let pendingId = null;

function render(){
  const g = initG();

  // 倒數
  const daysLeft = Math.max(0, Math.floor((EXAM_DATE - new Date()) / 86400000));
  document.getElementById('hud-days').textContent = daysLeft;
  document.getElementById('hud-streak').textContent = (g.streak||0) + '天';

  // EXP
  const exp = calcExp(g);
  document.getElementById('hud-exp').textContent = exp;
  document.getElementById('exp-label-r').textContent = exp + ' / ' + MAX_EXP;
  document.getElementById('exp-fill').style.width = Math.min(100, Math.round(exp/MAX_EXP*100)) + '%';

  // HP
  const hp = g.hp;
  document.getElementById('hud-hp').textContent = hp + '%';
  const hpFill = document.getElementById('hp-fill');
  hpFill.style.width = hp + '%';
  hpFill.style.background = hp>60 ? 'linear-gradient(90deg,#6BCB77,#44B853)' : hp>30 ? 'linear-gradient(90deg,#FF9F43,#E8861F)' : 'linear-gradient(90deg,#FF6B6B,#FF4757)';

  // 通關數
  const allLevels = WORLDS.flatMap(w=>w.levels);
  const doneCnt = allLevels.filter(l=>(g.progress[lvlKey(l)]||{}).stars>0).length;
  document.getElementById('hud-done').textContent = doneCnt + '/41';

  // 地圖
  renderMap(g);
}

function renderMap(g){
  const container = document.getElementById('map-container');
  container.innerHTML = '';

  WORLDS.forEach(world => {
    const wEl = document.createElement('div');
    wEl.className = 'world';

    // 計算世界進度
    const wDone = world.levels.filter(l=>(g.progress[lvlKey(l)]||{}).stars>0).length;
    const wPerf = world.levels.filter(l=>(g.progress[lvlKey(l)]||{}).stars===3).length;
    const wTotal = world.levels.length;
    const wClear = wDone === wTotal;

    // World Clear Banner
    if(wClear){
      const cb = document.createElement('div');
      cb.className = 'world-clear-banner';
      cb.innerHTML = `<div class="wcb-icon">🏆</div><div class="wcb-text"><h4>World Clear！${world.icon} ${world.name.split('・')[1]||world.name}</h4><p>完成 ${wTotal}/${wTotal} 關・完美 ${wPerf} 關 — 繼續前進！</p></div>`;
      wEl.appendChild(cb);
    }

    // Banner
    const banner = document.createElement('div');
    banner.className = `world-banner ${world.cls}`;
    banner.innerHTML = `
      <div class="wb-icon">${world.icon}</div>
      <div class="wb-info">
        <div class="wb-name">${world.name}</div>
        <div class="wb-sub"><span style="background:rgba(255,255,255,.25);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">${world.badge}</span>　${world.levels.length} 個關卡</div>
      </div>
      <div class="wb-prog">
        <div class="wp-num">${wDone}<span style="font-size:13px;font-weight:600;opacity:.8">/${wTotal}</span></div>
        <div class="wp-lbl">通關數</div>
        ${wPerf>0 ? `<div class="world-clear">⭐ 完美 ${wPerf}</div>` : ''}
      </div>`;
    wEl.appendChild(banner);

    // 關卡格線
    const grid = document.createElement('div');
    grid.className = 'quest-grid';

    world.levels.forEach(lvl => {
      const key = lvlKey(lvl);
      const prog = g.progress[key] || {};
      const stars = prog.stars || 0;
      const done = stars > 0;
      const perfect = stars === 3;

      const card = document.createElement('div');
      card.className = `qcard ${world.cls}` + (perfect ? ' perfect' : done ? ' done' : '');

      const starRow = done
        ? '⭐'.repeat(stars) + '🫙'.repeat(3-stars)
        : '<span style="color:#ccc;font-size:12px">尚未通關</span>';

      const statusBadge = perfect
        ? '<span class="status-badge sb-perfect">👑 完美</span>'
        : done
        ? '<span class="status-badge sb-done">✓ 通關</span>'
        : '<span class="status-badge sb-new">NEW</span>';

      const expGained = done ? EXP_PER_STAR[stars] : 0;
      const url = `index.html?go=guide&gidx=${world.gidx}&sidx=${lvl.sid}`;

      card.innerHTML = `
        <div class="qc-head">
          <div class="qc-lvnum ${done?'lit':''}">${lvl.num}</div>
          <div class="qc-meta">
            <div class="qc-sec">${world.name.split('・')[0]} · ${lvl.sec}</div>
            <div class="qc-title">${lvl.title}</div>
            <div class="qc-desc">${lvl.desc}</div>
          </div>
        </div>
        <div class="qc-status">
          <div class="stars-row">${starRow}</div>
          ${statusBadge}
          ${done ? `<div class="qc-exp">+${expGained} EXP</div>` : ''}
        </div>
        <div class="qc-btns">
          <a href="${url}" target="_blank" class="qbtn go">🚀 開始關卡</a>
          <button class="qbtn punch" onclick="openModal('${key}','${lvl.title}')">🚩 打卡通關</button>
        </div>`;

      grid.appendChild(card);
    });

    wEl.appendChild(grid);
    container.appendChild(wEl);
  });
}

/* ═══════════════════════════════════════
   Modal
   ═══════════════════════════════════════ */
function openModal(key, title){
  pendingId = key;
  document.getElementById('modal-title').textContent = '「' + title + '」';
  document.getElementById('modal-bg').classList.remove('hide');
}
function closeModal(){
  pendingId = null;
  document.getElementById('modal-bg').classList.add('hide');
}
function submitStar(stars){
  if(!pendingId) return;
  const g = loadG();
  const old = (g.progress[pendingId]||{}).stars || 0;
  g.progress[pendingId] = {stars, date: new Date().toISOString().slice(0,10)};
  // HP & Streak
  if(stars > old){
    if(stars===3){ g.hp = Math.min(100, g.hp + 15); }
    else if(stars===2){ g.hp = Math.min(100, g.hp + 5); }
  }
  saveG(g);
  closeModal();
  if(stars >= 2){
    confetti({particleCount: stars===3?180:80, spread:75, origin:{y:0.6},
      colors: stars===3 ? ['#FFD700','#FFA500','#FF6B6B','#4D96FF'] : ['#6BCB77','#4D96FF']});
  }
  render();
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* ═══════════════════════════════════════
   啟動
   ═══════════════════════════════════════ */
render();
</script>
</body>
</html>
