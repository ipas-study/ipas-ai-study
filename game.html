<title>🎮 57天特訓營 — iPAS AI 應用規劃師</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei','PingFang TC',system-ui,sans-serif;background:#F4F2EE;color:#1a1a1a;min-height:100vh}
a{text-decoration:none;color:inherit}

/* ── 卡通框 ── */
.comic{border:3px solid #000;box-shadow:4px 4px 0 #000;border-radius:14px}
.comic:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000}
.comic-sm{border:2px solid #000;box-shadow:2px 2px 0 #000;border-radius:10px}

/* ── Layout ── */
.wrap{max-width:960px;margin:0 auto;padding:16px}

/* ── Header ── */
.hdr{background:#FF6B6B;color:#fff;padding:20px 24px;border-radius:18px;border:3px solid #000;box-shadow:5px 5px 0 #000;margin-bottom:18px;position:relative}
.hdr h1{font-size:22px;font-weight:900;letter-spacing:.5px}
.hdr .sub{font-size:13px;opacity:.9;margin-top:4px}
.back-link{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.25);color:#fff;border:2px solid #fff;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.back-link:hover{background:rgba(0,0,0,.45)}

/* ── 資訊列 ── */
.info-bar{display:grid;grid-template-columns:1fr 2fr 1fr;gap:12px;margin-bottom:18px}
.info-box{background:#fff;border:3px solid #000;box-shadow:3px 3px 0 #000;border-radius:12px;padding:12px 16px;text-align:center}
.info-box .lbl{font-size:11px;font-weight:700;color:#666;margin-bottom:4px}
.info-box .val{font-size:26px;font-weight:900;color:#FF6B6B;line-height:1}
.info-box .val.green{color:#4CAF50}
.hp-wrap{text-align:left;padding:12px 16px}
.hp-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:6px}
.hp-bar-bg{background:#eee;border-radius:999px;height:20px;border:2px solid #000;overflow:hidden}
.hp-bar-fill{height:100%;border-radius:999px;transition:width .5s;background:linear-gradient(90deg,#4D96FF,#6BCB77)}

/* ── 警告 Banner ── */
.warn-banner{background:#FFD93D;border:3px solid #000;box-shadow:3px 3px 0 #000;border-radius:12px;padding:12px 16px;margin-bottom:18px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:10px}
.warn-banner.danger{background:#FF6B6B;color:#fff}

/* ── Tab ── */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.tab-btn{background:#fff;border:3px solid #000;box-shadow:3px 3px 0 #000;border-radius:12px;padding:14px;font-size:16px;font-weight:900;cursor:pointer;transition:.15s;text-align:center}
.tab-btn.active{background:#FFDE4D;box-shadow:2px 2px 0 #000}
.tab-btn:hover:not(.active){transform:translate(-1px,-1px);box-shadow:4px 4px 0 #000}

/* ── Section Header ── */
.sec-hdr{display:flex;align-items:center;gap:10px;margin:22px 0 12px}
.sec-hdr h2{font-size:16px;font-weight:900}
.sec-badge{background:#4D96FF;color:#fff;border:2px solid #000;box-shadow:2px 2px 0 #000;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:900}
.sec-badge.green{background:#6BCB77}
.sec-badge.orange{background:#FF9F43}
.sec-badge.purple{background:#9B59B6}
.sec-badge.red{background:#FF6B6B}
.sec-badge.teal{background:#0e8f9e}

/* ── 關卡卡片 ── */
.levels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.lvl-card{background:#fff;border:3px solid #000;box-shadow:4px 4px 0 #000;border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px;transition:.15s}
.lvl-card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000}
.lvl-card.done{background:#E8F9FD}
.lvl-card.perfect{background:#E8FFE8}

.type-study{background:#FFD93D}
.type-guide{background:#4D96FF;color:#fff}
.type-arena{background:#FF6B6B;color:#fff}
.type-bank{background:#9B59B6;color:#fff}
.type-mock{background:#FF9F43;color:#fff}
.type-terms{background:#6BCB77}
.lvl-chapter{font-size:11px;color:#666;font-weight:600}
.lvl-title{font-size:14px;font-weight:900;line-height:1.35}
.lvl-code{font-size:10px;color:#888;font-family:monospace}
.stars{font-size:16px;letter-spacing:2px;min-height:22px}

.cbtn{border:2px solid #000;box-shadow:2px 2px 0 #000;border-radius:8px;padding:7px 6px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:.15s;display:block}
.cbtn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #000}
.cbtn.go{background:#6BCB77;color:#fff}
.cbtn.punch{background:#FF6B6B;color:#fff}
.cbtn.synced{background:#eee;color:#888;cursor:default;border-style:dashed}
.cbtn.synced:hover{transform:none;box-shadow:2px 2px 0 #000}

.monster-den{background:linear-gradient(135deg,#2D2D2D,#1A1A1A);color:#fff;border:3px solid #000;box-shadow:5px 5px 0 #000;border-radius:16px;padding:20px;margin-top:8px;position:relative;overflow:hidden}
.monster-den::after{content:'🔥';position:absolute;right:16px;bottom:8px;font-size:72px;opacity:.1;pointer-events:none}
.monster-den h3{color:#FF6B6B;font-size:18px;font-weight:900;margin-bottom:8px}
.monster-den p{font-size:12px;color:#aaa;margin-bottom:14px;line-height:1.6}

/* ── Modal（打卡通關）── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}

const EXAM_DATE = new Date('2026-08-15T09:00:00+08:00');
const GAME_KEY = 'ipas_game_v1';
const NB_KEY = 'ipas_nb_v1';
const MOCK_RES_KEY = 'ipas_mock_results_v1';

function loadGame(){
  try{ return JSON.parse(localStorage.getItem(GAME_KEY)||'{}'); }catch(e){ return {}; }
}
function saveGame(g){ localStorage.setItem(GAME_KEY, JSON.stringify(g)); }

function initGame(){
  let g = loadGame();
  if(!g.progress) g.progress = {};
  if(!g.hp) g.hp = 100;
  if(!g.lastLogin) g.lastLogin = null;
  // HP 扣減：連續兩天未登入
  if(g.lastLogin){
    const last = new Date(g.lastLogin);
    const now = new Date();
    const daysMissed = Math.floor((now - last) / 86400000);
    if(daysMissed >= 2){
      const penalty = (daysMissed - 1) * 5;
      g.hp = Math.max(10, g.hp - penalty);
      document.getElementById('login-msg').textContent = `⚠️ 離上次登入 ${daysMissed} 天，HP -${penalty}`;
    }
  }
  g.lastLogin = new Date().toISOString().slice(0,10);
  saveGame(g);
  return g;
}

  '初級科一','初級科二',
  '學習指引・初級科一','學習指引・初級科二',
  '擂台・初級科一','擂台・初級科二',
  '考古題・初級','模擬考・初級','名詞解釋・初級',
  '中級科一','中級科二','中級科三',
  '學習指引・中級科一','學習指引・中級科二','學習指引・中級科三',
  '擂台・中級科一','擂台・中級科二','擂台・中級科三',
  '考古題・中級','模擬考・中級','名詞解釋・中級',
];

/* ════════════════════════════════════════════════════
   狀態
   ════════════════════════════════════════════════════ */
let currentStage = 'primary';
let pendingLevelId = null;
let gameState = null;

/* ════════════════════════════════════════════════════
   取得星等
   ════════════════════════════════════════════════════ */
function getStars(lvl, g){
  if(lvl.type === 'mock'){
    // 自動從 ipas_mock_results_v1 讀
    try{
      const rs = JSON.parse(localStorage.getItem(MOCK_RES_KEY)||'[]');
      const match = rs.find(r => r.scope === lvl.scope);
      if(!match) return 0;
      if(match.score >= 80) return 3;
      if(match.score >= 60) return 2;
      return 1;
    }catch(e){ return 0; }
  }
  return (g.progress[lvl.id] || {}).stars || 0;
}

function starDisplay(stars){
  if(stars === 0) return '<span style="color:#aaa">🫙🫙🫙 尚未通關</span>';
  return '⭐'.repeat(stars) + '🫙'.repeat(3-stars);
}

/* ════════════════════════════════════════════════════
   渲染引擎
   ════════════════════════════════════════════════════ */
function render(){
  gameState = initGame();
  const g = gameState;

  // 倒數
  const daysLeft = Math.max(0, Math.floor((EXAM_DATE - new Date()) / 86400000));
  document.getElementById('countdown-days').textContent = daysLeft;

  // HP
  const hp = g.hp;
  document.getElementById('hp-text').textContent = hp + '%';
  const bar = document.getElementById('hp-bar');
  bar.style.width = hp + '%';
  bar.style.background = hp > 60 ? 'linear-gradient(90deg,#4D96FF,#6BCB77)' : hp > 30 ? '#FF9F43' : '#FF6B6B';

  // 魔王窟
  try{
    const nb = JSON.parse(localStorage.getItem(NB_KEY)||'{"wrong":[]}');
    document.getElementById('monster-count').textContent = (nb.wrong||[]).length;
  }catch(e){}

  // 進度
  const stageL = LEVELS.filter(l => l.stage === currentStage);
  const doneCnt = stageL.filter(l => getStars(l, g) >= 1).length;
  const perfCnt = stageL.filter(l => getStars(l, g) === 3).length;
  const totalAll = LEVELS.filter(l=>getStars(l,g)>=1).length;
  document.getElementById('total-done').textContent = totalAll;
  document.getElementById('total-label').textContent = '/ 115 關已通關';

  // 警告
  const warnEl = document.getElementById('warn-banner');
  const warnTxt = document.getElementById('warn-text');
  const remaining = stageL.length - doneCnt;
  if(daysLeft > 0 && remaining > 0){
    const pace = (remaining / daysLeft).toFixed(1);
    const msg = `${currentStage==='primary'?'初級':'中級'}賽道：已通關 ${doneCnt}/${stageL.length}（完美 ${perfCnt} 關）。剩餘 ${remaining} 關・${daysLeft} 天，每天需攻克 ${pace} 關。`;
    warnTxt.textContent = msg;
    warnEl.className = parseFloat(pace) > 3 ? 'warn-banner danger' : 'warn-banner';
  } else if(remaining === 0){
    warnTxt.textContent = `🎉 ${currentStage==='primary'?'初級':'中級'}賽道全部通關！繼續保持！`;
    warnEl.className = 'warn-banner';
  }

  // 進度總覽
  renderOverview(g);

  // 關卡地圖
  renderLevels(g);
}

function renderOverview(g){
  const stageL = LEVELS.filter(l => l.stage === currentStage);
  const groups = {};
  stageL.forEach(l=>{
    if(!groups[l.chapter]) groups[l.chapter] = {total:0, done:0};
    groups[l.chapter].total++;
    if(getStars(l,g) >= 1) groups[l.chapter].done++;
  });
  const el = document.getElementById('progress-overview');
  let h = '<div style="font-size:13px;font-weight:900;margin-bottom:8px">📊 各區進度</div>';
  Object.entries(groups).forEach(([ch, {total, done}])=>{
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    h += `<div class="po-row"><span style="min-width:160px;font-size:12px">${ch}</span><div class="po-bar"><div class="po-fill" style="width:${pct}%"></div></div><span style="font-size:12px;min-width:60px;text-align:right">${done}/${total}</span></div>`;
  });
  el.innerHTML = h;
}

function renderLevels(g){
  const stageL = LEVELS.filter(l => l.stage === currentStage);

  // 按 chapter 分組
  const groups = {};
  stageL.forEach(l=>{
    if(!groups[l.chapter]) groups[l.chapter]=[];
    groups[l.chapter].push(l);
  });

  // 排序 chapter
  const orderedChapters = Object.keys(groups).sort((a,b)=>{
    const ai = CHAPTER_ORDER.indexOf(a), bi = CHAPTER_ORDER.indexOf(b);
    return (ai<0?99:ai) - (bi<0?99:bi);
  });

  const container = document.getElementById('levels-container');
  container.innerHTML = '';

  orderedChapters.forEach(ch => {
    const lvls = groups[ch];
    const meta = TYPE_META[lvls[0].type];

    // Section header
    const hdr = document.createElement('div');
    hdr.className = 'sec-hdr';
    hdr.innerHTML = `<span class="sec-badge ${meta.badgeCls}">${meta.label}</span><h2>${ch}</h2>`;
    container.appendChild(hdr);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'levels-grid';

    lvls.forEach(lvl => {
      const stars = getStars(lvl, g);
      const isMock = lvl.type === 'mock';
      let mockScore = null;
      if(isMock){
        try{
          const rs = JSON.parse(localStorage.getItem(MOCK_RES_KEY)||'[]');
          const match = rs.find(r=>r.scope===lvl.scope);
          if(match) mockScore = match;
        }catch(e){}
      }

      const card = document.createElement('div');
      card.className = 'lvl-card' + (stars===3?' perfect':(stars>=1?' done':''));

      let starsHtml = '';
      if(isMock && mockScore){
        starsHtml = `<div class="stars">${starDisplay(stars)}</div><div class="stars auto-label">🤖 自動同步・${mockScore.score}分（${mockScore.date}）</div>`;
      } else if(isMock){
        starsHtml = `<div class="stars">${starDisplay(stars)}</div><div class="stars auto-label">🤖 自動同步・完成模擬考後更新</div>`;
      } else {
        starsHtml = `<div class="stars">${starDisplay(stars)}</div>`;
      }

      card.innerHTML = `
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="type-tag ${meta.cls}">${meta.label}</span>
          ${lvl.code ? `<span class="lvl-code">${lvl.code}</span>` : ''}
        </div>
        <div class="lvl-chapter">${lvl.chapter}</div>
        <div class="lvl-title">${lvl.title}</div>
        ${lvl.desc ? `<div style="font-size:11px;color:#888">${lvl.desc}</div>` : ''}
        ${starsHtml}
        <div class="card-btns">
          <a href="${lvl.url}" target="_blank" class="cbtn go">🚀 前往複習</a>
          ${isMock
            ? `<span class="cbtn synced">🤖 自動計分</span>`
            : `<button class="cbtn punch" onclick="openModal('${lvl.id}')">🚩 打卡通關</button>`
          }
        </div>`;
      grid.appendChild(card);
    });

    container.appendChild(grid);
  });
}

/* ════════════════════════════════════════════════════
   Modal
   ════════════════════════════════════════════════════ */
function openModal(levelId){
  const lvl = LEVELS.find(l => l.id === levelId);
  if(!lvl) return;
  pendingLevelId = levelId;
  document.getElementById('modal-title').textContent = lvl.title;
  document.getElementById('modal-overlay').classList.remove('hide');
}

function closeModal(){
  pendingLevelId = null;
  document.getElementById('modal-overlay').classList.add('hide');
}

function submitStar(stars){
  if(!pendingLevelId) return;
  const g = loadGame();
  const old = (g.progress[pendingLevelId]||{}).stars || 0;
  g.progress[pendingLevelId] = {stars, date: new Date().toISOString().slice(0,10)};

  // HP 增減
  if(stars > old){
    if(stars === 3) g.hp = Math.min(100, g.hp + 15);
    else if(stars === 2) g.hp = Math.min(100, g.hp + 5);
  }
  saveGame(g);
  closeModal();

  if(stars >= 2){
    confetti({particleCount: stars===3?150:80, spread:70, origin:{y:0.6}});
  }
  render();
}

/* ════════════════════════════════════════════════════
   其他
   ════════════════════════════════════════════════════ */
function switchStage(stage){
  currentStage = stage;
  document.getElementById('tab-primary').className = 'tab-btn' + (stage==='primary'?' active':'');
  document.getElementById('tab-intermediate').className = 'tab-btn' + (stage==='intermediate'?' active':'');
  render();
}

function goMonsterDen(){
  window.open('index.html?go=bank', '_blank');
}

// ESC 關 Modal
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

/* ════════════════════════════════════════════════════
   啟動
   ════════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
